<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  
  <title>calculator</title>
</head>
<body>
<div id="main">
<input type="text" id="input" placeholder="Calculate..."/>

<div class="allbtns arithmatic">
<div id="btnrow">
  <div class="btn" style="background-color:rgb(223,126,142,0.5);color:white">AC</div>
  <div class="btn" style="background-color:rgb(90,70,245,0.5);color:white">D</div>
  <div class="btn operatorStyle">%</div>
  <div class="btn operatorStyle">X</div>
</div>	  
<div id="btnrow">
  <div class="btn">7</div>
  <div class="btn">8</div>
  <div class="btn">9</div>
  <div class="btn operatorStyle">/</div>
</div>  
<div id="btnrow">
  <div class="btn ">4</div>
  <div class="btn">5</div>
  <div class="btn">6</div>
  <div class="btn operatorStyle">-</div>
</div>
<div id="btnrow">
  <div class="btn">1</div>
  <div class="btn">2</div>
  <div class="btn">3</div>
  <div class="btn operatorStyle">+</div>
</div>

<div id="btnrow">
  <div class="btn">00</div>
  <div class="btn">0</div>
  <div class="btn">.</div>
  <div class="btn equal">=</div>
</div>	
</div>

</div>
